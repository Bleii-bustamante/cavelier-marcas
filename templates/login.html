<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cavelier — Acceso</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a2a4a 0%, #2c3e6b 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 48px 40px 40px;
      width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo h1 { font-size: 28px; letter-spacing: 4px; color: #1a2a4a; font-weight: 700; }
    .logo p  { font-size: 11px; letter-spacing: 6px; color: #7f8c9a; margin-top: 2px; }
    .logo .divider { width: 40px; height: 2px; background: #c9a84c; margin: 12px auto; }
    label { display: block; font-size: 11px; font-weight: 600;
            color: #7f8c9a; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
    input[type=text], input[type=password] {
      width: 100%; padding: 12px 14px; border: 1.5px solid #e0e4ea;
      border-radius: 7px; font-size: 14px; color: #1a2a4a;
      transition: border-color .2s;
    }
    input:focus { outline: none; border-color: #1a2a4a; }
    .form-group { margin-bottom: 20px; }
    .btn {
      width: 100%; padding: 13px; background: #1a2a4a; color: #fff;
      border: none; border-radius: 7px; font-size: 15px;
      font-weight: 600; cursor: pointer; letter-spacing: 1px;
      transition: background .2s;
    }
    .btn:hover { background: #2c3e6b; }
    .error {
      background: #fef2f2; border: 1px solid #fecaca;
      color: #c0392b; border-radius: 6px; padding: 10px 14px;
      font-size: 13px; margin-bottom: 20px;
    }
    .footer-text { text-align:center; font-size:11px; color:#aaa; margin-top:24px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>CAVELIER</h1>
      <p>ABOGADOS</p>
      <div class="divider"></div>
      <p style="font-size:12px;color:#555;letter-spacing:1px;">Sistema de Vigilancia de Marcas</p>
    </div>
    {% if error %}
    <div class="error">⚠️ {{ error }}</div>
    {% endif %}
    <form method="POST">
      <div class="form-group">
        <label>Usuario</label>
        <input type="text" name="usuario" placeholder="Tu usuario" required autofocus>
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button class="btn" type="submit">INGRESAR</button>
    </form>
    <p class="footer-text">Acceso restringido — solo personal autorizado</p>
  </div>
</body>
</html>
